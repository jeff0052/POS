upstream pos_admin {
  server pc-admin:80;
}

upstream pos_api {
  server pos-backend:8080;
}

upstream payment_api {
  server pos-payment-service:8081;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  # Override CSP to allow Vite/React bundled code
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https:; frame-src 'self';" always;

  location / {
    proxy_pass http://pos_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Payment webhooks only — providers need to reach this from outside
  location /payment-api/v1/payments/webhooks/ {
    rewrite ^/payment-api/(.*) /api/$1 break;
    proxy_pass http://payment_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Payment health check
  location = /payment-api/v1/payments/health {
    rewrite ^/payment-api/(.*) /api/$1 break;
    proxy_pass http://payment_api;
  }

  # Block all other payment-api routes from public access
  location /payment-api/ {
    return 403 '{"error":"Payment API is internal only"}';
    add_header Content-Type application/json;
  }

  location /api/ {
    proxy_pass http://pos_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
