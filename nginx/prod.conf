upstream pos_admin {
  server pc-admin:80;
}

upstream pos_api {
  server pos-backend:8080;
}

upstream payment_api {
  server pos-payment-service:8081;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  location / {
    proxy_pass http://pos_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /payment-api/ {
    rewrite ^/payment-api/(.*) /api/$1 break;
    proxy_pass http://payment_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://pos_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
