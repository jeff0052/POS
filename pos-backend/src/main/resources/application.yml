server:
  port: 8080

aws:
  s3:
    bucket: ${S3_BUCKET:founderpos-images}
    region: ${S3_REGION:us-east-1}

spring:
  application:
    name: pos-backend
  profiles:
    active: mock
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5187,http://localhost:5188,http://localhost:4183,http://localhost:4184,http://127.0.0.1:5187,http://127.0.0.1:5188,http://127.0.0.1:4183}

pos:
  callback-secret: ${POS_CALLBACK_SECRET:}

auth:
  bootstrap:
    secret: ${AUTH_BOOTSTRAP_SECRET:}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

vibecash:
  api-url: ${VIBECASH_API_URL:https://api.vibecash.dev}
  secret: ${VIBECASH_SECRET:}
  webhook-secret: ${VIBECASH_WEBHOOK_SECRET:}
  currency: ${VIBECASH_CURRENCY:SGD}

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/pos_v2_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/v2
    baseline-on-migrate: true
    validate-on-migrate: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

---
spring:
  config:
    activate:
      on-profile: v2mysql
  datasource:
    url: ${V2_MYSQL_URL:jdbc:mysql://localhost:3306/pos_v2_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${V2_MYSQL_USERNAME:root}
    password: ${V2_MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/v2
    baseline-on-migrate: true
    validate-on-migrate: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
