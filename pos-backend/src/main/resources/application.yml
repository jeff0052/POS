server:
  port: 8080

spring:
  application:
    name: pos-backend
  profiles:
    active: mock
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

vibecash:
  api-url: ${VIBECASH_API_URL:https://api.vibecash.dev}
  secret: ${VIBECASH_SECRET:}
  webhook-secret: ${VIBECASH_WEBHOOK_SECRET:}
  currency: ${VIBECASH_CURRENCY:SGD}

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/pos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: v2mysql
  datasource:
    url: ${V2_MYSQL_URL:jdbc:mysql://localhost:3306/pos_v2_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${V2_MYSQL_USERNAME:root}
    password: ${V2_MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/v2
    baseline-on-migrate: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
