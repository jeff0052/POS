services:
  mysql:
    image: mysql:8.4
    container_name: pos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pos-backend:
    build:
      context: ./pos-backend
    container_name: pos-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      VIBECASH_API_URL: ${VIBECASH_API_URL}
      VIBECASH_SECRET: ${VIBECASH_SECRET}
      VIBECASH_WEBHOOK_SECRET: ${VIBECASH_WEBHOOK_SECRET}
      VIBECASH_CURRENCY: ${VIBECASH_CURRENCY:-SGD}

  pos-payment-service:
    build:
      context: ./pos-payment-service
    container_name: pos-payment-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PAYMENT_DB_URL: jdbc:mysql://mysql:3306/pos_payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      PAYMENT_DB_USERNAME: ${MYSQL_USERNAME}
      PAYMENT_DB_PASSWORD: ${MYSQL_PASSWORD}
      POS_CALLBACK_URL: http://pos-backend:8080/api/v2/internal/payment-callback
      POS_CALLBACK_SECRET: ${POS_CALLBACK_SECRET}
      VIBECASH_ENABLED: ${VIBECASH_ENABLED:-false}
      VIBECASH_API_URL: ${VIBECASH_API_URL}
      VIBECASH_SECRET: ${VIBECASH_SECRET}
      VIBECASH_WEBHOOK_SECRET: ${VIBECASH_WEBHOOK_SECRET}
      DCS_ENABLED: ${DCS_ENABLED:-false}

  pc-admin:
    build:
      context: ./pc-admin
      dockerfile: Dockerfile.prod
    container_name: pc-admin
    restart: unless-stopped
    depends_on:
      - pos-backend

  nginx:
    image: nginx:1.27-alpine
    container_name: pos-nginx
    restart: unless-stopped
    depends_on:
      - pc-admin
      - pos-backend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
