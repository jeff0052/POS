server:
  port: 8081

spring:
  application:
    name: pos-payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/pos_payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${PAYMENT_DB_USERNAME:root}
    password: ${PAYMENT_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Callback to POS backend when payment succeeds
pos:
  callback-url: ${POS_CALLBACK_URL:http://localhost:8080/api/v2/internal/payment-callback}
  callback-secret: ${POS_CALLBACK_SECRET:}

# Provider credentials
security:
  service-api-key: ${PAYMENT_SERVICE_API_KEY:}

providers:
  vibecash:
    enabled: ${VIBECASH_ENABLED:false}
    api-url: ${VIBECASH_API_URL:https://api.vibecash.dev}
    secret: ${VIBECASH_SECRET:}
    webhook-secret: ${VIBECASH_WEBHOOK_SECRET:}
    currency: ${VIBECASH_CURRENCY:SGD}
  dcs:
    enabled: ${DCS_ENABLED:false}
  cash:
    enabled: true
